name: Generate Hub README

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      github_user:
        description: 'GitHub username to filter by (leave empty for all)'
        required: false
        default: 'roebi'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Query roebi-agent-skills topic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.event.inputs.github_user || 'roebi' }}
        run: |
          bash scripts/generate-readme.sh "$GITHUB_USER"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || \
            git commit -m "chore: update hub README [skip ci]" && \
            git push
